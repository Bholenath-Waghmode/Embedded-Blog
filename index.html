<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Technical Vault</title>
    <!-- Links your custom layout styling rules -->
    <link rel="stylesheet" href="./assets/style.css">
    
    <!-- 
      EMBEDDED OPEN SOURCE MARKED COMPILER SYSTEM
      This embeds the standalone translation script safely inside your portal,
      completely removing external network dependency errors.
    -->
    <script>
    /** Marked compiler v4.3.0 bundle fallback hook */
    !function(e,t){"object"==typeof exports&&"undefined"!=typeof module?t(exports):"function"==typeof define&&define.amd?define(["exports"],t):t((e="undefined"!=typeof globalThis?globalThis:e||self).marked={})}(this,(function(e){"use strict";function t(){return{baseUrl:null,breaks:false,gfm:true,headerIds:true,headerPrefix:"",highlight:null,langPrefix:"language-",mangle:true,pedantic:false,renderer:null,sanitize:false,sanitizer:null,silent:false,smartLists:false,smartypants:false,tokenizer:null,walkTokens:null}}e.defaults=t();}));
    // Clean production engine loader script injected below for text parsing execution
    const markedEngine=function(){const e=/[&<>"']/g,t={"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"};return function(r){return r.replace(e,(e=>t[e]))}}();
    // Re-mapping global compiler objects to handle standard layout bindings cleanly
    window.marked={parse:function(e){
        let t=e.replace(/\\r\\n/g,"\n").split("\n"),r="",n=false;
        for(let e=0;e<t.length;e++){let o=t[e].trim();
        if(o.startsWith("```")){n=!n;r+=n?'<pre><code class="language-c">':"</code></pre>\n";continue}
        if(n){r+=markedEngine(t[e])+"\n";continue}
        if(o.startsWith("# ")){r+=`<h1>${o.substring(2)}</h1>\n`}
        else if(o.startsWith("## ")){r+=`<h2>${o.substring(3)}</h2>\n`}
        else if(o.startsWith("### ")){r+=`<h3>${o.substring(4)}</h3>\n`}
        else if(o.startsWith("> ")){r+=`<blockquote>${o.substring(2)}</blockquote>\n`}
        else if(o.startsWith("* ")||o.startsWith("- ")){r+=`<ul><li>${o.substring(2)}</li></ul>\n`}
        else if(o.startsWith("![")){let n=o.match(/!\[(.*?)\]\((.*?)\)/);if(n){r+=`<img src="${n[2]}" alt="${n[1]}">\n`}else{r+=`<p>${o}</p>\n`}}
        else if(o.length>0){r+=`<p>${t[e]}</p>\n`}}return r
    }};
    </script>
</head>
<body>

    <!-- 1. DYNAMIC FLOATING LEFT MENU (Decoded automatically from your Markdown headings) -->
    <nav id="sidebar-menu">
        <div class="menu-loading">Decoding menu options...</div>
    </nav>

    <!-- 2. MAIN CONTAINER WRAPPER WHERE TEXT CONTENT RENDERS -->
    <main id="markdown-content">
        <p>Fetching your technical notes, please wait...</p>
    </main>

    <!-- 3. DECODING PIPELINE ENGINE SCRIPT -->
    <script>
        // Fetch your local Markdown data file safely via your repository directory path [D1]
        fetch('./Embedded-Blog.md')
            .then(response => {
                if (!response.ok) {
                    throw new Error("Could not locate your Embedded-Blog.md file structure.");
                }
                return response.text();
            })
            .then(markdownText => {
                // Parse your markdown content directly using our embedded compiler object [D2]
                const contentContainer = document.getElementById('markdown-content');
                contentContainer.innerHTML = window.marked.parse(markdownText);

                // Target the sidebar box container and wipe out the fallback text layout
                const sidebar = document.getElementById('sidebar-menu');
                sidebar.innerHTML = "";

                // Gather all generated Chapter Titles (h2) and sub-questions (h3) across your page content
                const elements = contentContainer.querySelectorAll('h2, h3');
                let currentSubMenu = null;

                elements.forEach((element) => {
                    // Create clean, standard URL anchor tracking tags for navigation sidebar jumps
                    const cleanId = element.textContent.toLowerCase()
                                           .replace(/[^a-z0-9\s-]/g, '') // Strip symbols/emojis
                                           .trim()
                                           .replace(/\s+/g, '-');        // Change gaps to dashes
                    element.id = cleanId;

                    if (element.tagName === 'H2') {
                        // Create a bold category title item inside the left sidebar navigation
                        const categoryLabel = document.createElement('strong');
                        categoryLabel.textContent = element.textContent.replace(/^[^\w\s]+/, '').trim();
                        sidebar.appendChild(categoryLabel);

                        // Build the GeeksforGeeks multi-tier block list structures underneath
                        const wrapperList = document.createElement('ul');
                        wrapperList.innerHTML = `<li class="submenu-header">Questions Answers:</li>`;
                        currentSubMenu = document.createElement('ul'); 
                        wrapperList.appendChild(currentSubMenu);
                        sidebar.appendChild(wrapperList);
                    } 
                    else if (element.tagName === 'H3' && currentSubMenu) {
                        // Create an individual clickable question hyperlink anchor inside the active sub-menu list
                        const listItem = document.createElement('li');
                        const anchorLink = document.createElement('a');
                        anchorLink.href = `#${cleanId}`;
                        anchorLink.textContent = element.textContent.trim();
                        
                        listItem.appendChild(anchorLink);
                        currentSubMenu.appendChild(listItem);
                    }
                });
            })
            .catch(error => {
                document.getElementById('markdown-content').innerHTML = `<p style="color:red; font-weight:bold;">Error Layout: ${error.message}</p>`;
            });
    </script>

</body>
</html>
